<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimroel Admin</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="admin-container">
        <h1 class="admin-title">NIMROEL ADMIN</h1>

        <div class="auth-box">
            <p id="authStatus" class="auth-status">Debes iniciar sesion para continuar.</p>
            <button id="loginBtn" type="button">INICIAR SESION CON GOOGLE</button>
        </div>

        <div class="admin-box is-disabled" id="adminBox" aria-disabled="true">
            <section class="admin-section">
                <h2 class="section-title">Busqueda y Carga</h2>

                <input type="text" id="searchIdInput" placeholder="Buscar ID (parcial o completo)">
                <button id="searchBtn" class="action-btn action-btn-secondary" type="button" disabled>BUSCAR IDS</button>
                <div class="search-results" id="searchResults"></div>

                <input type="text" id="selectedIdInput" placeholder="ID para cargar desde Firebase">
                <button id="loadSelectedBtn" class="action-btn action-btn-secondary" type="button" disabled>CARGAR JSON EN FORMULARIO</button>
                <button id="newDocBtn" class="action-btn action-btn-secondary" type="button" disabled>NUEVO DOCUMENTO (LIMPIAR)</button>
            </section>

            <section class="admin-section">
                <h2 class="section-title">Editor de Personaje</h2>

                <div class="form-grid">
                    <label class="field-label" for="fieldId">ID</label>
                    <input type="text" id="fieldId" placeholder="kazan_rise">

                    <label class="field-label" for="fieldType">Type</label>
                    <input type="text" id="fieldType" placeholder="character">

                    <label class="field-label" for="fieldName">Name</label>
                    <input type="text" id="fieldName" placeholder="Kazan Rise">

                    <label class="field-label" for="fieldSlug">Slug</label>
                    <input type="text" id="fieldSlug" placeholder="kazan-rise">

                    <label class="field-label" for="metaTitle">Meta Title</label>
                    <input type="text" id="metaTitle" placeholder="Kazan Rise">

                    <label class="field-label" for="metaImage">Meta Image</label>
                    <input type="text" id="metaImage" placeholder="assets/images/characters/kazan.webp">

                    <label class="field-label" for="metaDescription">Meta Description</label>
                    <textarea id="metaDescription" rows="4" placeholder="Descripcion para SEO"></textarea>

                    <label class="field-label" for="aliasInput">Alias (una linea por item o separadas por coma)</label>
                    <textarea id="aliasInput" rows="3" placeholder="El Titan de Treskal"></textarea>

                    <label class="field-label" for="tagsInput">Tags (una linea por item o separadas por coma)</label>
                    <textarea id="tagsInput" rows="3" placeholder="legendario\nmago"></textarea>

                    <label class="field-label" for="relCharacters">Relations.characters</label>
                    <textarea id="relCharacters" rows="3" placeholder="clarisse\njorvin"></textarea>

                    <label class="field-label" for="relLocations">Relations.locations</label>
                    <textarea id="relLocations" rows="3" placeholder="treskal\nhallheim"></textarea>

                    <label class="field-label" for="relEvents">Relations.events</label>
                    <textarea id="relEvents" rows="3" placeholder="dragon_milenario"></textarea>

                    <label class="field-label" for="summaryInput">Content.summary</label>
                    <textarea id="summaryInput" rows="6" placeholder="Resumen del personaje"></textarea>
                </div>

                <div class="sub-block">
                    <div class="sub-block-header">
                        <h3 class="sub-title">Content.sections</h3>
                        <button id="addSectionBtn" class="mini-btn" type="button" disabled>ANADIR SECCION</button>
                    </div>
                    <div id="sectionsContainer" class="sections-container"></div>
                </div>

                <div class="form-grid">
                    <label class="field-label" for="extraRace">Extra.race</label>
                    <input type="text" id="extraRace" placeholder="Humano">

                    <label class="field-label" for="extraBirth">Extra.birth</label>
                    <input type="text" id="extraBirth" placeholder="15310 (Era del Renacer)">

                    <label class="field-label" for="extraDeath">Extra.death</label>
                    <input type="text" id="extraDeath" placeholder="15374 (Era del Renacer)">

                    <label class="field-label" for="extraAffiliation">Extra.affiliation (una linea por item o separadas por coma)</label>
                    <textarea id="extraAffiliation" rows="3" placeholder="santuario"></textarea>
                </div>
            </section>

            <section class="admin-section">
                <h2 class="section-title">Acciones</h2>

                <button id="createBtn" class="action-btn" type="button" disabled>CREAR JSON NUEVO EN FIREBASE</button>
                <button id="overwriteBtn" class="action-btn action-btn-secondary" type="button" disabled>GUARDAR CAMBIOS SOBRE ID CARGADO</button>
                <button id="deleteBtn" class="action-btn action-btn-danger" type="button" disabled>ELIMINAR DOCUMENTO CARGADO</button>
                <button id="downloadPdfBtn" class="action-btn action-btn-secondary" type="button" disabled>DESCARGAR PDF FORMATEADO</button>

                <div class="admin-info" id="editorInfo"></div>
            </section>

            <section class="admin-section">
                <h2 class="section-title">Vista Previa JSON</h2>
                <pre id="jsonPreview" class="json-preview">{}</pre>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script type="module" src="firebase.js"></script>
</body>

</html>
