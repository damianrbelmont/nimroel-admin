<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimroel Admin</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="admin-container">

        <h1 class="admin-title">NIMROEL ADMIN</h1>

        <div class="auth-box">
            <p id="authStatus" class="auth-status">Debes iniciar sesion para continuar.</p>
            <button id="loginBtn" type="button">INICIAR SESION CON GOOGLE</button>
        </div>

        <div class="admin-box is-disabled" id="adminBox" aria-disabled="true">
            <section class="admin-section">
                <h2 class="section-title">Subir JSON Nuevo</h2>

                <input type="file" id="newJsonFile" accept=".json">
                <input type="text" id="newJsonId" placeholder="ID">
                <input type="text" id="newJsonType" placeholder="Tipo (character, location...)">
                <button id="createBtn" class="action-btn" type="button" disabled>SUBIR JSON NUEVO A FIREBASE</button>

                <div class="admin-info" id="newJsonInfo"></div>
            </section>

            <section class="admin-section">
                <h2 class="section-title">Editar JSON de Firebase</h2>

                <input type="text" id="searchIdInput" placeholder="Buscar ID (parcial o completo)">
                <button id="searchBtn" class="action-btn action-btn-secondary" type="button" disabled>BUSCAR IDS</button>
                <div class="search-results" id="searchResults"></div>

                <input type="text" id="selectedIdInput" placeholder="ID seleccionado" readonly>
                <button id="loadSelectedBtn" class="action-btn action-btn-secondary" type="button" disabled>CARGAR JSON SELECCIONADO</button>

                <input type="file" id="editJsonFile" accept=".json">
                <input type="text" id="editJsonType" placeholder="Tipo para actualizar/sobrescribir">

                <button id="mergeBtn" class="action-btn action-btn-secondary" type="button" disabled>ANADIR (MERGE, SIN BORRAR CAMPOS)</button>
                <button id="overwriteBtn" class="action-btn" type="button" disabled>SOBRESCRIBIR JSON EXISTENTE</button>
                <button id="deleteBtn" class="action-btn action-btn-danger" type="button" disabled>ELIMINAR JSON DE FIREBASE</button>

                <div class="admin-info" id="editJsonInfo"></div>
            </section>
        </div>

    </main>

    <!-- 🔥 Firebase separado -->
    <script type="module" src="firebase.js"></script>

</body>

</html>
