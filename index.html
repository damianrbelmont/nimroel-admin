<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimroel Admin</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="admin-container">

        <h1 class="admin-title">NIMROEL ADMIN</h1>

        <div class="admin-box">

            <input type="file" id="jsonFile" accept=".json">

            <input type="text" id="jsonId" placeholder="ID">
            <input type="text" id="jsonType" placeholder="Tipo (character, location...)">

            <button id="uploadBtn">SUBIR A FIREBASE</button>

            <div class="admin-info" id="jsonInfo"></div>

        </div>

    </main>

    <!-- 🔥 Firebase separado -->
    <script type="module" src="firebase.js"></script>

</body>

</html>
